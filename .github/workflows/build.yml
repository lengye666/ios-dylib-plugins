name: Build Dylibs

on:
  workflow_dispatch:
    inputs:
      target:
        description: '选择要编译的插件'
        required: true
        type: choice
        default: 'LengyeDouyin'
        options:
          - 'LengyeDouyin'
          - 'HaodeKamiBridge'
          - 'DouyinDramaSkip'
          - 'KamiBypass'
          - 'TIXBypass'
          - 'NetworkLogger'

jobs:
  build:
    name: Build ${{ github.event.inputs.target }}
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build LengyeDouyin
      if: github.event.inputs.target == 'LengyeDouyin'
      run: |
        clang -arch arm64 -arch arm64e \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -target arm64-apple-ios14.0 \
          -shared -dynamiclib \
          -framework Foundation -framework UIKit -framework AVFoundation \
          -framework Speech -framework Photos \
          -fobjc-arc \
          -o LengyeDouyin.dylib lengye-tiktok-assistant.m
        lipo -info LengyeDouyin.dylib
        echo "✅ 冷夜抖音助手 编译完成"

    - name: Build HaodeKamiBridge
      if: github.event.inputs.target == 'HaodeKamiBridge'
      run: |
        clang -arch arm64 -arch arm64e \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -target arm64-apple-ios14.0 \
          -shared -dynamiclib \
          -framework Foundation -framework UIKit -framework Security \
          -fobjc-arc \
          -o HaodeKamiBridge.dylib haode-kami-bridge.m
        lipo -info HaodeKamiBridge.dylib
        echo "✅ HaodeKamiBridge 编译完成"

    - name: Build DouyinDramaSkip
      if: github.event.inputs.target == 'DouyinDramaSkip'
      run: |
        clang -arch arm64 -arch arm64e \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -target arm64-apple-ios14.0 \
          -shared -dynamiclib \
          -framework Foundation -framework UIKit -framework AVFoundation \
          -fobjc-arc \
          -o DouyinDramaSkip.dylib douyin-drama-skip.m
        lipo -info DouyinDramaSkip.dylib
        echo "✅ DouyinDramaSkip 编译完成"

    - name: Build KamiBypass
      if: github.event.inputs.target == 'KamiBypass'
      run: |
        clang -arch arm64 -arch arm64e \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -target arm64-apple-ios14.0 \
          -shared -dynamiclib -framework Foundation \
          -fobjc-arc -o KamiBypass.dylib kami-bypass.m
        lipo -info KamiBypass.dylib
        echo "✅ KamiBypass 编译完成"

    - name: Build TIXBypass
      if: github.event.inputs.target == 'TIXBypass'
      run: |
        clang -arch arm64 -arch arm64e \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -target arm64-apple-ios14.0 \
          -shared -dynamiclib -framework Foundation \
          -fobjc-arc -o TIXBypass.dylib bypass.m
        lipo -info TIXBypass.dylib
        echo "✅ TIXBypass 编译完成"

    - name: Build NetworkLogger
      if: github.event.inputs.target == 'NetworkLogger'
      run: |
        clang -arch arm64 -arch arm64e \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -target arm64-apple-ios14.0 \
          -shared -dynamiclib \
          -framework Foundation -framework UIKit -framework CoreGraphics \
          -fobjc-arc \
          -o NetworkLogger.dylib network-logger.m
        lipo -info NetworkLogger.dylib
        echo "✅ NetworkLogger 编译完成"

    - name: Package artifact
      run: |
        TARGET="${{ github.event.inputs.target }}"
        echo "Artifact: ${TARGET}.dylib"
        ls -lh ${TARGET}.dylib

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.target }}
        path: ${{ github.event.inputs.target }}.dylib
