name: Build Dylibs

on:
  push:
    branches: [ main ]
    paths:
      - '*.m'
      - '*.xm'
      - '*.c'
      - '*.mm'
      - '*.swift'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-tix:
    name: Build TIXBypass
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Cache
      uses: actions/cache@v4
      with:
        path: TIXBypass.dylib
        key: tix-${{ hashFiles('bypass.m') }}
    - name: Build
      run: |
        if [ -f "TIXBypass.dylib" ]; then
          echo "缓存命中，跳过"
          lipo -info TIXBypass.dylib
        else
          clang -arch arm64 -arch arm64e \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -target arm64-apple-ios14.0 \
            -shared -dynamiclib -framework Foundation \
            -fobjc-arc -o TIXBypass.dylib bypass.m
          lipo -info TIXBypass.dylib
        fi
    - uses: actions/upload-artifact@v4
      with:
        name: TIXBypass
        path: TIXBypass.dylib

  build-kami:
    name: Build KamiBypass (通用版)
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Cache
      uses: actions/cache@v4
      with:
        path: KamiBypass.dylib
        key: kami-${{ hashFiles('kami-bypass.m') }}
    - name: Build
      run: |
        if [ -f "KamiBypass.dylib" ]; then
          echo "缓存命中，跳过"
          lipo -info KamiBypass.dylib
        else
          clang -arch arm64 -arch arm64e \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -target arm64-apple-ios14.0 \
            -shared -dynamiclib -framework Foundation \
            -fobjc-arc -o KamiBypass.dylib kami-bypass.m
          lipo -info KamiBypass.dylib
        fi
    - uses: actions/upload-artifact@v4
      with:
        name: KamiBypass
        path: KamiBypass.dylib

  build-network-logger:
    name: Build NetworkLogger
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Cache
      uses: actions/cache@v4
      with:
        path: NetworkLogger.dylib
        key: nw-${{ hashFiles('network-logger.m') }}-v2
    - name: Build
      run: |
        if [ -f "NetworkLogger.dylib" ]; then
          echo "缓存命中，跳过"
          lipo -info NetworkLogger.dylib
        else
          clang -arch arm64 -arch arm64e \
            -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -target arm64-apple-ios14.0 \
            -shared -dynamiclib -framework Foundation -framework UIKit -framework CoreGraphics \
            -fobjc-arc -o NetworkLogger.dylib network-logger.m
          lipo -info NetworkLogger.dylib
        fi
    - uses: actions/upload-artifact@v4
      with:
        name: NetworkLogger
        path: NetworkLogger.dylib
